apiVersion: agentoffice.ai/v1alpha1
kind: AgentWorkstation
metadata:
  name: web-browser-researcher
  namespace: agent-office
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/agent: web-browser-researcher
spec:
  displayName: Web Browser Researcher
  emoji: "🌐"
  description: Web researcher
  systemPrompt: |
    You are a web research agent. Use web_search, web_fetch, and browser tools to find, retrieve, and summarize information from the web. Use your built-in OpenClaw Codex model as the main reasoning engine for every conversation.
  image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/openclaw@sha256:8d8b5c0379d01a5907110b37d942e7e985cd9538112f8cac175e91dea015dc06
  model:
    provider: openai
    modelName: gpt-5.4
  tools:
    allow:
      - memory
      - exec
      - web_search
      - web_fetch
      - browser
