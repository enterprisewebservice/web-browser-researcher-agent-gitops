apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-browser-researcher-agent
  namespace: openshift-gitops
  finalizers: ["resources-finalizer.argocd.argoproj.io"]
spec:
  project: default
  source:
    path: ./overlays/development
    repoURL: https://github.com/enterprisewebservice/web-browser-researcher-agent-gitops.git
    targetRevision: main
  destination:
    namespace: agent-office
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
